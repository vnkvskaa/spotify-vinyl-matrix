; ESP32 Spotify vinyl matrix (16x16 WS2812)
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
lib_deps =
	fastled/FastLED@^3.9.0
	bblanchon/ArduinoJson@^7.3.0
	bitbank2/JPEGDEC@^1.8.0
build_flags =
	-DCORE_DEBUG_LEVEL=0
