<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>30 clock concepts · 16×16</title>
  <style>
    :root {
      --bg: #111114;
      --panel: #1a1a1f;
      --text: #ececf1;
      --muted: #9a9aa6;
      --line: #2c2c34;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 28px;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: -0.03em;
      font-weight: 600;
    }
    .lead {
      margin: 0 0 24px;
      color: var(--muted);
      max-width: 720px;
      line-height: 1.45;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }
    .card canvas {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #050506;
      border-radius: 6px;
      image-rendering: pixelated;
    }
    .card .n {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .card .n b {
      color: var(--text);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>30 вариантов часов на 16×16</h1>
  <p class="lead">Статичные эскизы без анимации. Везде одно время 14:37 — чтобы сравнивать раскладку, а не движение.</p>
  <div class="grid" id="grid"></div>
  <script>
    const N = 16;
    const CELL = 10;
    const GAP = 1;
    const PX = N * (CELL + GAP);
    const HH = 14, MM = 37, SS = 22;

    const DIG = [
      [7,5,5,5,7],[2,6,2,2,7],[7,1,7,4,7],[7,1,7,1,7],[5,5,7,1,1],
      [7,4,7,1,7],[7,4,7,5,7],[7,1,1,1,1],[7,5,7,5,7],[7,5,7,1,7]
    ];

    function blank() {
      return Array.from({ length: N * N }, () => [0, 0, 0]);
    }
    function set(p, x, y, c) {
      if (x < 0 || y < 0 || x >= N || y >= N) return;
      p[y * N + x] = c;
    }
    function get(p, x, y) {
      if (x < 0 || y < 0 || x >= N || y >= N) return [0, 0, 0];
      return p[y * N + x];
    }
    function mix(a, b, t) {
      return [
        (a[0] + (b[0] - a[0]) * t) | 0,
        (a[1] + (b[1] - a[1]) * t) | 0,
        (a[2] + (b[2] - a[2]) * t) | 0
      ];
    }
    function hsv(h, s, v) {
      h = ((h % 360) + 360) % 360;
      const c = v * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = v - c;
      let r = 0, g = 0, b = 0;
      if (h < 60) [r,g,b]=[c,x,0];
      else if (h < 120) [r,g,b]=[x,c,0];
      else if (h < 180) [r,g,b]=[0,c,x];
      else if (h < 240) [r,g,b]=[0,x,c];
      else if (h < 300) [r,g,b]=[x,0,c];
      else [r,g,b]=[c,0,x];
      return [(r+m)*255|0,(g+m)*255|0,(b+m)*255|0];
    }
    function digit(p, ox, oy, d, col) {
      for (let row = 0; row < 5; row++)
        for (let colx = 0; colx < 3; colx++)
          if (DIG[d][row] & (4 >> colx)) set(p, ox + colx, oy + row, col);
    }
    function ring(p, cx, cy, r0, r1, col) {
      for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
        const d = Math.hypot(x - cx, y - cy);
        if (d >= r0 && d <= r1) set(p, x, y, col);
      }
    }
    function fillDisk(p, cx, cy, r, col) {
      for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
        if (Math.hypot(x - cx, y - cy) <= r) set(p, x, y, col);
      }
    }
    function line(p, x0, y0, x1, y1, col) {
      const steps = Math.max(Math.abs(x1 - x0), Math.abs(y1 - y0), 1) * 2;
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        set(p, Math.round(x0 + (x1 - x0) * t), Math.round(y0 + (y1 - y0) * t), col);
      }
    }
    function rect(p, x0, y0, w, h, col) {
      for (let y = y0; y < y0 + h; y++)
        for (let x = x0; x < x0 + w; x++) set(p, x, y, col);
    }
    function hand(p, cx, cy, ang, len, col) {
      line(p, cx, cy, Math.round(cx + Math.cos(ang) * len), Math.round(cy + Math.sin(ang) * len), col);
    }

    const CX = 7.5, CY = 7.5;
    const hourAng = -Math.PI / 2 + ((HH % 12) + MM / 60) / 12 * Math.PI * 2;
    const minAng = -Math.PI / 2 + MM / 60 * Math.PI * 2;
    const secAng = -Math.PI / 2 + SS / 60 * Math.PI * 2;

    const concepts = [
      ["Classic digital", p => {
        digit(p, 2, 2, 1, [220,230,245]); digit(p, 6, 2, 4, [220,230,245]);
        digit(p, 2, 9, 3, [220,230,245]); digit(p, 6, 9, 7, [220,230,245]);
        set(p, 12, 4, [180,190,210]); set(p, 12, 11, [180,190,210]);
      }],
      ["Centered HHMM", p => {
        digit(p, 1, 5, 1, [240,240,250]); digit(p, 5, 5, 4, [240,240,250]);
        digit(p, 9, 5, 3, [180,200,255]); digit(p, 13, 5, 7, [180,200,255]);
      }],
      ["Analog only", p => {
        ring(p, CX, CY, 6.8, 7.5, [50,55,65]);
        hand(p, 8, 8, hourAng, 3, [210,180,120]);
        hand(p, 8, 8, minAng, 5, [200,210,230]);
        set(p, 8, 8, [255,255,255]);
      }],
      ["Analog + ticks", p => {
        ring(p, CX, CY, 6.9, 7.6, [40,45,55]);
        for (let i = 0; i < 12; i++) {
          const a = -Math.PI/2 + i/12*Math.PI*2;
          set(p, Math.round(CX + Math.cos(a)*7.2), Math.round(CY + Math.sin(a)*7.2), i%3===0?[220,220,230]:[80,85,95]);
        }
        hand(p, 8, 8, hourAng, 3, [230,200,140]);
        hand(p, 8, 8, minAng, 6, [230,235,245]);
        set(p, 8, 8, [255,255,255]);
      }],
      ["Orbit pearl", p => {
        fillDisk(p, CX, CY, 6.5, [18,20,28]);
        ring(p, CX, CY, 6.8, 7.5, [60,70,90]);
        digit(p, 3, 3, 1, [230,235,250]); digit(p, 8, 3, 4, [230,235,250]);
        digit(p, 3, 9, 3, [230,235,250]); digit(p, 8, 9, 7, [230,235,250]);
        set(p, Math.round(CX+Math.cos(secAng)*7.15), Math.round(CY+Math.sin(secAng)*7.15), [255,230,180]);
      }],
      ["Progress seconds", p => {
        ring(p, CX, CY, 6.9, 7.6, [30,32,40]);
        for (let i = 0; i < SS; i++) {
          const a = -Math.PI/2 + i/60*Math.PI*2;
          set(p, Math.round(CX+Math.cos(a)*7.2), Math.round(CY+Math.sin(a)*7.2), [120,200,255]);
        }
        digit(p, 3, 5, 1, [240,245,255]); digit(p, 8, 5, 4, [240,245,255]);
      }],
      ["Binary blocks", p => {
        const groups = [
          [(HH >> 4) & 15, 2, 3, [90, 200, 140]],
          [HH & 15, 2, 9, [90, 200, 140]],
          [(MM >> 4) & 15, 9, 3, [200, 170, 90]],
          [MM & 15, 9, 9, [200, 170, 90]],
        ];
        for (const [val, ox, oy, col] of groups) {
          for (let b = 0; b < 4; b++) {
            const on = (val >> (3 - b)) & 1;
            rect(p, ox + (b % 2) * 2, oy + Math.floor(b / 2) * 2, 2, 2, on ? col : [28, 32, 30]);
          }
        }
      }],
      ["Bars HH / MM", p => {
        rect(p, 2, 3, Math.max(1, Math.round(HH/24*12)), 3, [90,160,255]);
        rect(p, 2, 9, Math.max(1, Math.round(MM/60*12)), 3, [255,180,90]);
        for (let x = 2; x < 14; x++) { set(p, x, 2, [40,40,48]); set(p, x, 13, [40,40,48]); }
      }],
      ["Corner stamps", p => {
        digit(p, 1, 1, 1, [255,120,120]); digit(p, 12, 1, 4, [120,255,160]);
        digit(p, 1, 10, 3, [120,180,255]); digit(p, 12, 10, 7, [255,220,120]);
      }],
      ["Split face", p => {
        rect(p, 0, 0, 8, 16, [24,28,40]);
        rect(p, 8, 0, 8, 16, [40,28,24]);
        digit(p, 2, 5, 1, [180,200,255]); digit(p, 5, 5, 4, [180,200,255]);
        digit(p, 9, 5, 3, [255,200,160]); digit(p, 12, 5, 7, [255,200,160]);
      }],
      ["Minimal colon", p => {
        digit(p, 1, 5, 1, [230,230,240]); digit(p, 5, 5, 4, [230,230,240]);
        set(p, 8, 6, [255,255,255]); set(p, 8, 9, [255,255,255]);
        digit(p, 10, 5, 3, [230,230,240]); digit(p, 14, 5, 7, [230,230,240]);
      }],
      ["Big hour tiny min", p => {
        // fat hour as 2 large blocks hint
        digit(p, 2, 2, 1, [250,250,255]); digit(p, 7, 2, 4, [250,250,255]);
        // minutes as 2x denser bottom tiny - use 3x5 smaller spacing
        digit(p, 5, 10, 3, [120,130,150]); digit(p, 9, 10, 7, [120,130,150]);
      }],
      ["Wordless dots hour", p => {
        // 14 dots for hour in a row of pairs, minutes as ring fill
        for (let i = 0; i < HH; i++) set(p, 1 + (i%7)*2, 2 + Math.floor(i/7)*2, [220,220,240]);
        for (let i = 0; i < Math.floor(MM/5); i++) {
          const a = -Math.PI/2 + i/(60/5)*Math.PI*2;
          set(p, Math.round(CX+Math.cos(a)*6), Math.round(CY+Math.sin(a)*6), [100,180,255]);
        }
      }],
      ["Frame calendar-ish", p => {
        rect(p, 1, 1, 14, 1, [80,80,90]); rect(p, 1, 14, 14, 1, [80,80,90]);
        rect(p, 1, 1, 1, 14, [80,80,90]); rect(p, 14, 1, 1, 14, [80,80,90]);
        digit(p, 3, 5, 1, [240,240,250]); digit(p, 7, 5, 4, [240,240,250]);
        set(p, 11, 6, [200,200,210]); set(p, 11, 9, [200,200,210]);
        // minute as right column meter
        for (let y = 0; y < Math.round(MM/60*12); y++) set(p, 13, 13-y, [255,160,80]);
      }],
      ["Neon outline digits", p => {
        fillDisk(p, CX, CY, 7.6, [8,10,16]);
        digit(p, 2, 2, 1, [0,255,200]); digit(p, 6, 2, 4, [0,255,200]);
        digit(p, 2, 9, 3, [255,80,180]); digit(p, 6, 9, 7, [255,80,180]);
        ring(p, CX, CY, 7.2, 7.7, [30,60,70]);
      }],
      ["Rainbow rim + time", p => {
        for (let i = 0; i < 48; i++) {
          const a = i/48*Math.PI*2;
          set(p, Math.round(CX+Math.cos(a)*7.3), Math.round(CY+Math.sin(a)*7.3), hsv(i*7.5, 0.9, 0.8));
        }
        digit(p, 3, 5, 1, [255,255,255]); digit(p, 8, 5, 4, [255,255,255]);
      }],
      ["Night stars clock", p => {
        for (let i = 0; i < 18; i++) {
          const sx = (i * 5 + 3) % 16, sy = (i * 9 + 1) % 16;
          if (Math.hypot(sx-CX, sy-CY) > 5) set(p, sx, sy, [40,45,70]);
        }
        digit(p, 3, 5, 1, [240,245,255]); digit(p, 8, 5, 4, [240,245,255]);
        set(p, Math.round(CX+Math.cos(secAng)*6.5), Math.round(CY+Math.sin(secAng)*6.5), [255,255,200]);
      }],
      ["Quarter pie", p => {
        for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
          const a = Math.atan2(y-CY, x-CX);
          const d = Math.hypot(x-CX, y-CY);
          if (d < 7.2) {
            const q = Math.floor(((a + Math.PI*2.5) % (Math.PI*2)) / (Math.PI/2));
            const cols = [[40,40,50],[50,40,40],[40,50,45],[45,45,40]];
            set(p, x, y, cols[q]);
          }
        }
        digit(p, 5, 5, 1, [255,255,255]); digit(p, 9, 5, 4, [255,255,255]);
      }],
      ["Mirrored twins", p => {
        digit(p, 1, 2, 1, [200,210,230]); digit(p, 5, 2, 4, [200,210,230]);
        digit(p, 9, 9, 3, [200,210,230]); digit(p, 13, 9, 7, [200,210,230]);
        line(p, 0, 8, 15, 8, [50,55,65]);
      }],
      ["Diagonal cascade", p => {
        for (let i = 0; i < 16; i++) set(p, i, i, [35,40,55]);
        digit(p, 8, 1, 1, [240,240,255]); digit(p, 12, 1, 4, [240,240,255]);
        digit(p, 1, 10, 3, [180,200,255]); digit(p, 5, 10, 7, [180,200,255]);
      }],
      ["Watch bezel", p => {
        fillDisk(p, CX, CY, 5.2, [20,22,28]);
        ring(p, CX, CY, 5.5, 6.2, [90,70,40]);
        ring(p, CX, CY, 6.5, 7.5, [60,60,70]);
        digit(p, 4, 5, 1, [240,235,220]); digit(p, 8, 5, 4, [240,235,220]);
      }],
      ["Segment ladder", p => {
        // hours as left vertical segments, minutes right
        for (let y = 0; y < Math.min(14, HH); y++) set(p, 3, 1+y, [80,160,255]);
        for (let y = 0; y < Math.min(14, Math.floor(MM/4)); y++) set(p, 12, 1+y, [255,160,80]);
        set(p, 7, 7, [255,255,255]); set(p, 8, 7, [255,255,255]);
        set(p, 7, 9, [255,255,255]); set(p, 8, 9, [255,255,255]);
      }],
      ["Pixel badge", p => {
        rect(p, 2, 4, 12, 8, [32,36,48]);
        rect(p, 2, 4, 12, 1, [90,100,130]);
        digit(p, 3, 6, 1, [250,250,255]); digit(p, 7, 6, 4, [250,250,255]);
        set(p, 11, 7, [200,210,230]); set(p, 11, 9, [200,210,230]);
      }],
      ["Two-line terminal", p => {
        for (let x = 0; x < 16; x++) { set(p, x, 0, [20,40,20]); set(p, x, 15, [20,40,20]); }
        digit(p, 2, 3, 1, [80,255,120]); digit(p, 6, 3, 4, [80,255,120]);
        digit(p, 2, 9, 3, [80,255,120]); digit(p, 6, 9, 7, [80,255,120]);
        set(p, 14, 14, [80,255,120]);
      }],
      ["Moon phase + time", p => {
        fillDisk(p, 4, 4, 2.6, [200,210,230]);
        fillDisk(p, 5.2, 4, 2.3, [10,12,18]); // crescent
        digit(p, 8, 9, 1, [220,225,240]); digit(p, 12, 9, 4, [220,225,240]);
        // minutes tiny
        for (let i = 0; i < Math.floor(MM/10); i++) set(p, 9+i, 14, [120,140,180]);
      }],
      ["Crosshair analog", p => {
        line(p, 8, 1, 8, 14, [30,35,45]);
        line(p, 1, 8, 14, 8, [30,35,45]);
        ring(p, CX, CY, 6.8, 7.4, [70,75,90]);
        hand(p, 8, 8, hourAng, 3, [255,200,120]);
        hand(p, 8, 8, minAng, 6, [220,230,255]);
        set(p, 8, 8, [255,255,255]);
      }],
      ["Heartbeat timeline", p => {
        // ECG-like zig across middle, time above
        digit(p, 2, 1, 1, [255,120,140]); digit(p, 6, 1, 4, [255,120,140]);
        const path = [2,8,4,8,5,5,6,11,7,8,10,8,11,6,12,8,14,8];
        for (let i = 0; i < path.length-2; i+=2) line(p, path[i], path[i+1], path[i+2], path[i+3], [200,60,90]);
        digit(p, 5, 11, 3, [180,180,190]); digit(p, 9, 11, 7, [180,180,190]);
      }],
      ["Grid paper", p => {
        for (let y = 0; y < N; y++) for (let x = 0; x < N; x++)
          if (x%4===0 || y%4===0) set(p, x, y, [28,30,38]);
        digit(p, 2, 5, 1, [240,240,250]); digit(p, 6, 5, 4, [240,240,250]);
        digit(p, 10, 5, 3, [160,180,220]); digit(p, 14, 5, 7, [160,180,220]);
      }],
      ["Spotlight digits", p => {
        for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
          const d = Math.hypot(x - 7.5, y - 5.5);
          const v = Math.max(0, 1 - d / 8);
          set(p, x, y, [ (v*25)|0, (v*28)|0, (v*40)|0 ]);
        }
        digit(p, 3, 3, 1, [255,255,255]); digit(p, 8, 3, 4, [255,255,255]);
        digit(p, 5, 10, 3, [180,190,210]); digit(p, 9, 10, 7, [180,190,210]);
      }],
      ["Arc hour / arc minute", p => {
        ring(p, CX, CY, 5.0, 5.6, [40,40,48]);
        ring(p, CX, CY, 6.5, 7.2, [40,40,48]);
        for (let i = 0; i < Math.round((HH%12)/12*24); i++) {
          const a = -Math.PI/2 + i/24*Math.PI*2;
          set(p, Math.round(CX+Math.cos(a)*5.3), Math.round(CY+Math.sin(a)*5.3), [255,190,100]);
        }
        for (let i = 0; i < Math.round(MM/60*36); i++) {
          const a = -Math.PI/2 + i/36*Math.PI*2;
          set(p, Math.round(CX+Math.cos(a)*6.85), Math.round(CY+Math.sin(a)*6.85), [120,180,255]);
        }
        set(p, 8, 8, [255,255,255]);
      }],
    ];

    // Ensure exactly 30
    while (concepts.length > 30) concepts.pop();
    while (concepts.length < 30) {
      concepts.push([`Variant ${concepts.length+1}`, p => {
        digit(p, 3, 5, 1, [200,200,210]); digit(p, 8, 5, 4, [200,200,210]);
      }]);
    }

    const grid = document.getElementById("grid");
    concepts.forEach(([name, draw], idx) => {
      const card = document.createElement("div");
      card.className = "card";
      const canvas = document.createElement("canvas");
      canvas.width = PX;
      canvas.height = PX;
      const ctx = canvas.getContext("2d");
      const pixels = blank();
      draw(pixels);
      ctx.fillStyle = "#050506";
      ctx.fillRect(0, 0, PX, PX);
      for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
        const [r,g,b] = pixels[y*N+x];
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(x*(CELL+GAP), y*(CELL+GAP), CELL, CELL);
      }
      const label = document.createElement("div");
      label.className = "n";
      label.innerHTML = `<b>${idx+1}.</b> ${name}`;
      card.appendChild(canvas);
      card.appendChild(label);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
